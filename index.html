<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add a Product</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <h1>Student Enrollment System</h1>
      <p>Manage and view student enrollment information</p>
    </header>

    <main id="container">
      <section id="form-wrapper">
        <h2>Add New Student</h2>
        <form id="product-form">
          <div class="field">
            <label for="fullName">Full Name</label>
            <input type="text" id="fullName" name="fullName" placeholder="Enter full name" required />
          </div>
          <div class="field">
            <label for="course">Course</label>
            <input type="text" id="course" name="course" placeholder="Enter course name" required />
          </div>
          <div class="field">
            <label for="yearLevel">Year Level</label>
            <input type="text" id="yearLevel" name="yearLevel" placeholder="E.g., 1st Year, 2nd Year" required />
          </div>
          <div class="field">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="Enter email address" required />
          </div>
           <div class="field">
            <label for="dateEnrolled">Date Enrolled</label>
            <input type="date" id="dateEnrolled" name="dateEnrolled" required />
          </div>
          <button type="submit" id="add">Add Student</button>
        </form>
      </section>

      <section id="list-wrapper">
        <h2>Enrolled Students</h2>
        <div id="content" class="students-grid"></div>
      </section>
    </main>

    <script src="index.js"></script>
  </body>
</html>
